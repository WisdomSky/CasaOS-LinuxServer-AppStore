name: linuxserver-shadps4
services:
  app:
    image: linuxserver/shadps4:version-shadPS4QtLauncher-2026-06-28-360cc86677d1487fdadb78539c18fbd464d40f54
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: Run 'id [USER]' for the owner of the host volume directories to get the UID to use here.
        - container: PGID
          description:
            en_us: Run 'id [USER]' for the owner of the host volume directories to get the GID to use here.
        - container: TZ
          description:
            en_us: specify a timezone to use, see this list.
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
      - target: 3001
        published: 3001
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/shadps4/config
        target: /config
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: shadPS4 is an early PlayStation 4 emulator for Windows, Linux and macOS written in C++.
  tagline:
    en_us: An early PlayStation 4 emulator for Windows, Linux and macOS written in C++.
  developer: LinuxServer.io
  author: WisdomSky
  icon: https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/shadps4-logo.png
  thumbnail: https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/shadps4-logo.png
  title:
    en_us: Shadps4
  category: LinuxServer.io
  port_map: '3000'
