name: linuxserver-eden
services:
  app:
    image: linuxserver/eden:0.2.1
    restart: unless-stopped
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
    x-casaos:
      envs:
        - container: PUID
          description:
            en_us: Run 'id [USER]' for the owner of the host volume directories to get the UID to use here.
        - container: PGID
          description:
            en_us: Run 'id [USER]' for the owner of the host volume directories to get the GID to use here.
        - container: TZ
          description:
            en_us: specify a timezone to use, see this list.
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
      - target: 3001
        published: 3001
        protocol: tcp
    volumes:
      - type: bind
        source: /DATA/AppData/eden/config
        target: /config
x-casaos:
  architectures:
    - amd64
  main: app
  description:
    en_us: Eden is an experimental open-source emulator for the Nintendo Switch, built with performance and stability in mind.
  tagline:
    en_us: An experimental open-source emulator for the Nintendo Switch, built with performance and stability in mind.
  developer: LinuxServer.io
  author: WisdomSky
  icon: https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/eden-logo.png
  thumbnail: https://raw.githubusercontent.com/linuxserver/docker-templates/master/linuxserver.io/img/eden-logo.png
  title:
    en_us: Eden
  category: LinuxServer.io
  port_map: '3000'
